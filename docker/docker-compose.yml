services:
  backend:
    container_name: unt-voting-backend
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - .env
    volumes:
      - ../apps/contracts:/app/contracts
    depends_on:
      - postgres
      - redis
      - deepface-service

  deepface-service:
    container_name: deepface-service
    build:
      context: ../deepface-service
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    container_name: unt-voting-system
    build:
      context: ../apps/frontend
    ports:
      - "3001:80"
    depends_on:
      - backend

  telegram-bot:
    container_name: unt-voting-telegram-bot
    build:
      context: ../telegram-bot
      dockerfile: Dockerfile
    env_file:
      - ../telegram-bot/.env
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
